name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, ctype, iconv, intl
          coverage: none

      - run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Host hostinger" >> ~/.ssh/config
          echo "  HostName ${{ secrets.SSH_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.SSH_USER }}" >> ~/.ssh/config
          echo "  Port ${{ secrets.SSH_PORT }}" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_rsa" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy
        run: |
          ssh hostinger "mkdir -p ${{ secrets.APP_PATH }}"
          rsync -az --delete \
            --exclude='.git/' --exclude='.github/' \
            --exclude='.env.local' --exclude='var/' \
            --exclude='node_modules/' --exclude='public/' \
            ./ "hostinger:${{ secrets.APP_PATH }}/"
          rsync -az --delete \
            --exclude='index.php' \
            public/ "hostinger:${{ secrets.DEPLOY_PATH }}/"
          sed "s|__APP_ROOT__|${{ secrets.APP_PATH }}|g" deploy/hostinger/index.php.template \
            | ssh hostinger "cat > ${{ secrets.DEPLOY_PATH }}/index.php"

      - name: Post-deploy
        run: |
          ssh hostinger "
            cd ${{ secrets.APP_PATH }}
            php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration --env=prod
            php bin/console cache:clear --env=prod --no-warmup
            php bin/console cache:warmup --env=prod
          "
