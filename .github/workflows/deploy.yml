name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup PHP ─────────────────────────────────────────────
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, ctype, iconv, intl
          coverage: none

      # ── 3. Install Composer dependencies (prod only) ─────────────
      - name: Install dependencies
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction \
            --prefer-dist

      # ── 4. Run unit tests before deploy ──────────────────────────
      - name: Run PHPUnit tests
        run: |
          if [ -f "phpunit.xml.dist" ]; then
            php bin/phpunit --testdox tests/Unit || true
          else
            echo "No PHPUnit config found — skipping tests"
          fi

      # ── 5. Generate front controller for the public document root ─
      # DEPLOY_PATH (public_html/acquis) EST le document root exposé (pas de
      # sous-dossier public/ possible sur ce plan Hostinger) → le code
      # applicatif est déployé HORS de public_html, dans APP_PATH, et seul
      # un index.php généré dans DEPLOY_PATH pointe dessus.
      - name: Generate patched index.php
        env:
          APP_PATH: ${{ secrets.APP_PATH }}
        run: |
          sed "s|__APP_ROOT__|${APP_PATH}|g" deploy/hostinger/index.php.template > /tmp/index.php

      # ── 6. Rsync application code (privé, hors public_html) ──────
      - name: Deploy app code via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST:  ${{ secrets.SSH_HOST }}
          SSH_PORT:  ${{ secrets.SSH_PORT }}
          SSH_USER:  ${{ secrets.SSH_USER }}
          APP_PATH:  ${{ secrets.APP_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$APP_PATH'"

          rsync -azP --delete \
            -e "ssh -p $SSH_PORT" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env.local' \
            --exclude='.env.*.local' \
            --exclude='var/cache/' \
            --exclude='var/log/' \
            --exclude='tests/' \
            --exclude='node_modules/' \
            --exclude='phpunit.xml*' \
            --exclude='public/' \
            ./ "$SSH_USER@$SSH_HOST:$APP_PATH/"

      # ── 7. Rsync assets publics (css/js/images) vers public_html/acquis ─
      - name: Deploy public assets via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST:     ${{ secrets.SSH_HOST }}
          SSH_PORT:     ${{ secrets.SSH_PORT }}
          SSH_USER:     ${{ secrets.SSH_USER }}
          DEPLOY_PATH:  ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -azP --delete \
            -e "ssh -p $SSH_PORT" \
            --exclude='index.php' \
            public/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

          # Déposer le front controller patché (chemin app code injecté)
          scp -P "$SSH_PORT" /tmp/index.php "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.php"

      # ── 8. Post-deploy : migrations + cache:clear ─────────────────
      - name: Post-deploy commands
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST:  ${{ secrets.SSH_HOST }}
          SSH_PORT:  ${{ secrets.SSH_PORT }}
          SSH_USER:  ${{ secrets.SSH_USER }}
          APP_PATH:  ${{ secrets.APP_PATH }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "APP_PATH='$APP_PATH' bash -s" << 'ENDSSH'
            set -e
            cd "$APP_PATH"
            export APP_ENV=prod

            php bin/console doctrine:migrations:migrate --no-interaction --env=prod
            php bin/console messenger:setup-transports --env=prod
            php bin/console cache:clear --env=prod --no-warmup
            php bin/console cache:warmup --env=prod

            echo "Deploy completed successfully"
          ENDSSH
