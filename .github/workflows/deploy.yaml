name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-dev --no-progress --optimize-autoloader --no-interaction

      # Décommenter quand des tests existent (voir ACQ-DEV-001 section 8)
      # - name: Run tests
      #   run: php bin/phpunit

      - name: Package build artifact
        run: |
          mkdir -p build
          rsync -a \
            --exclude='.git' \
            --exclude='var/cache' \
            --exclude='var/log' \
            --exclude='.env.local' \
            --exclude='.github' \
            ./ build/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: build/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: build/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync files to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            --exclude='.env.local' \
            --exclude='var/cache' \
            --exclude='var/log' \
            build/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Run post-deploy commands
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             php bin/console doctrine:migrations:migrate --no-interaction --env=prod && \
             php bin/console messenger:setup-transports --env=prod && \
             php bin/console cache:clear --env=prod && \
             chmod -R 775 var/cache var/log"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key