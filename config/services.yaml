# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Liaisons interfaces Domain → implémentations Infrastructure
    App\Domain\Shared\Repository\UserRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\UserRepository

    App\Domain\Parcours\Repository\ParcoursRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\ParcoursRepository

    App\Domain\Parcours\Repository\RessourceRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\RessourceRepository

    App\Domain\Consolidation\Repository\TraceApprentissageRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\TraceApprentissageRepository

    App\Domain\Consolidation\Repository\SessionConsolidationRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\SessionConsolidationRepository

    App\Domain\Projet\Repository\ProjetFilRougeRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\ProjetFilRougeRepository

    App\Domain\Revision\Repository\RevisionSpaceeRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\RevisionSpaceeRepository

    App\Domain\Progression\Repository\ProgressionRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\ProgressionRepository

    App\Domain\Consolidation\Repository\QuestionRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\QuestionRepository

    App\Domain\Consolidation\Repository\ExerciceRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\ExerciceRepository

    App\Domain\Projet\Repository\MicroEtapeRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\MicroEtapeRepository

    # ClaudeAdapter — clé API depuis .env
    App\Infrastructure\IA\Gateway\ClaudeAdapter:
        arguments:
            $anthropicApiKey: '%env(ANTHROPIC_API_KEY)%'

    App\Infrastructure\IA\Gateway\GroqAdapter:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'

    App\Application\IA\Port\IAGatewayInterface:
        class: App\Infrastructure\IA\Gateway\GroqAdapter
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'

    # StrategyResolver — tagged services
    App\Application\IA\Strategy\StrategyResolver:
        arguments:
            $strategies: !tagged_iterator { tag: 'app.ia.strategy', exclude: 'App\Application\IA\Strategy\DefaultStrategy' }

    App\Application\IA\Strategy\DevWebStrategy:
        tags: ['app.ia.strategy']
    App\Application\IA\Strategy\DesignStrategy:
        tags: ['app.ia.strategy']
    App\Application\IA\Strategy\LangueStrategy:
        tags: ['app.ia.strategy']
    App\Application\IA\Strategy\ComptabiliteStrategy:
        tags: ['app.ia.strategy']
