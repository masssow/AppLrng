name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    # Variables SSH disponibles dans TOUTES les étapes du job
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      APP_PATH: ${{ secrets.APP_PATH }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup PHP ─────────────────────────────────────────────
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, ctype, iconv, intl
          coverage: none

      # ── 3. Install Composer dependencies (prod only) ─────────────
      - name: Install dependencies
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction \
            --prefer-dist

      # ── 4. Run unit tests ─────────────────────────────────────────
      - name: Run PHPUnit tests
        run: |
          if [ -f "phpunit.xml.dist" ]; then
            php bin/phpunit --testdox tests/Unit || true
          else
            echo "No PHPUnit config — skipping"
          fi

      # ── 5. Generate front controller ─────────────────────────────
      - name: Generate patched index.php
        run: |
          sed "s|__APP_ROOT__|${APP_PATH}|g" deploy/hostinger/index.php.template > /tmp/index.php
          echo "Generated index.php pointing to: ${APP_PATH}"

      # ── 6. Configure SSH ─────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          PORT="${SSH_PORT:-65002}"
          # Config SSH : désactive StrictHostKeyChecking (firewall Hostinger bloque keyscan)
          cat >> ~/.ssh/config << EOF
          Host $SSH_HOST
            Port $PORT
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config
          echo "SSH configured — host=$SSH_HOST port=$PORT user=$SSH_USER"

      # ── 7. Rsync code applicatif (hors public_html) ──────────────
      - name: Deploy app code via rsync
        run: |
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p '$APP_PATH'"
          rsync -azP --delete \
            -e "ssh" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env.local' \
            --exclude='.env.*.local' \
            --exclude='var/cache/' \
            --exclude='var/log/' \
            --exclude='tests/' \
            --exclude='node_modules/' \
            --exclude='phpunit.xml*' \
            --exclude='deploy_key*' \
            --exclude='public/' \
            ./ "$SSH_USER@$SSH_HOST:$APP_PATH/"

      # ── 8. Rsync assets publics + front controller ───────────────
      - name: Deploy public assets via rsync
        run: |
          rsync -azP --delete \
            -e "ssh" \
            --exclude='index.php' \
            public/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
          scp /tmp/index.php "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.php"

      # ── 9. Post-deploy : migrations + cache ──────────────────────
      - name: Post-deploy commands
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            "cd '$APP_PATH' && \
             export APP_ENV=prod && \
             php bin/console doctrine:migrations:migrate --no-interaction --env=prod && \
             php bin/console messenger:setup-transports --env=prod && \
             php bin/console cache:clear --env=prod --no-warmup && \
             php bin/console cache:warmup --env=prod && \
             echo 'Deploy completed successfully'"
